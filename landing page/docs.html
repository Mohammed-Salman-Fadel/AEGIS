<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AEGIS documentation for setup, CLI usage, engine flow, and project structure." />
    <title>AEGIS Docs</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      :root {
        --bg:           #08090e;
        --bg-1:         #0c0d17;
        --bg-2:         #10121e;
        --bg-3:         #161828;
        --border:       rgba(255,255,255,0.07);
        --border-md:    rgba(255,255,255,0.12);
        --border-hi:    rgba(255,255,255,0.18);
        --accent:       #4ade80;
        --accent-dim:   rgba(74,222,128,0.10);
        --accent-glow:  rgba(74,222,128,0.28);
        --accent-ring:  rgba(74,222,128,0.20);
        --indigo:       #818cf8;
        --indigo-dim:   rgba(129,140,248,0.10);
        --amber:        #fbbf24;
        --amber-dim:    rgba(251,191,36,0.10);
        --red:          #f87171;
        --txt:          #eeeef8;
        --txt-2:        #9898b8;
        --txt-3:        #55556a;
        --mono:         'JetBrains Mono','Fira Code','Cascadia Code',monospace;
        --sans:         'Inter',system-ui,-apple-system,sans-serif;
        --nav-h:        62px;
        --sb-w:         248px;
        --toc-w:        190px;
        --r:            7px;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: var(--bg);
        color: var(--txt);
        font-family: var(--sans);
        font-size: 15px;
        line-height: 1.75;
        min-height: 100vh;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      button { cursor: pointer; font-family: inherit; }

      .noise-layer {
        position: fixed; inset: 0;
        pointer-events: none; z-index: 999; opacity: 0.022;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px;
      }
      .scroll-progress {
        position: fixed; top: 0; left: 0; height: 2px; width: 0%;
        background: linear-gradient(90deg, var(--accent), var(--indigo));
        z-index: 1001; transition: width 0.08s linear;
      }

      .navbar {
        position: fixed; top: 0; left: 0; right: 0;
        height: var(--nav-h);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 2rem;
        background: rgba(8,9,14,0.82);
        backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--border);
        z-index: 100;
      }
      .nav-logo {
        display: flex; align-items: center; gap: 0.55rem;
        font-family: var(--mono); font-weight: 700; font-size: 1.05rem;
        color: var(--txt); letter-spacing: 0.14em; text-decoration: none;
      }
      .nav-logo-icon {
        width: 18px; height: 18px;
        background: var(--accent); border-radius: 3px;
        box-shadow: 0 0 10px var(--accent-glow);
        display: block; flex-shrink: 0;
      }
      .nav-links { display: flex; align-items: center; gap: 2rem; }
      .nav-links a {
        color: var(--txt-2); font-size: 0.88rem; font-weight: 500;
        text-decoration: none; transition: color 0.18s;
      }
      .nav-links a:hover { color: var(--txt); }
      .nav-links a.active { color: var(--accent); }

      .docs-shell {
        display: flex;
        min-height: 100vh;
        padding-top: var(--nav-h);
      }

      .docs-sidebar {
        position: fixed; top: var(--nav-h); left: 0; bottom: 0;
        width: var(--sb-w);
        background: var(--bg-1);
        border-right: 1px solid var(--border);
        overflow-y: auto; display: flex; flex-direction: column;
        z-index: 50;
      }
      .docs-sidebar::-webkit-scrollbar { width: 3px; }
      .docs-sidebar::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

      .sb-search {
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        position: sticky; top: 0;
        background: var(--bg-1); z-index: 2;
      }
      .sb-search-wrap { position: relative; }
      .sb-search-wrap svg {
        position: absolute; left: 0.65rem; top: 50%; transform: translateY(-50%);
        width: 13px; height: 13px;
        stroke: var(--txt-3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        pointer-events: none;
      }
      .sb-search input {
        width: 100%;
        background: var(--bg-2); border: 1px solid var(--border);
        padding: 0.5rem 0.75rem 0.5rem 2.1rem;
        color: var(--txt); font-size: 0.83rem; font-family: var(--sans);
        outline: none; transition: border-color 0.18s, box-shadow 0.18s;
      }
      .sb-search input::placeholder { color: var(--txt-3); }
      .sb-search input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-ring);
      }

      .sb-version {
        display: flex; align-items: center; gap: 0.5rem;
        padding: 0.7rem 1rem 0.4rem;
        font-family: var(--mono); font-size: 0.7rem; color: var(--txt-3);
        border-bottom: 1px solid var(--border);
      }
      .sb-version-pill {
        background: var(--accent-dim); color: var(--accent);
        border: 1px solid rgba(74,222,128,0.22);
        padding: 0.08rem 0.42rem;
        font-family: var(--mono); font-size: 0.67rem; font-weight: 600;
      }

      .sb-nav { padding: 0.5rem 0 2rem; flex: 1; }
      .sb-group { margin-top: 0.15rem; }
      .sb-group-label {
        padding: 0.9rem 1rem 0.4rem;
        font-size: 0.73rem; font-weight: 700;
        letter-spacing: 0.13em; text-transform: uppercase;
        color: #767699; font-family: var(--mono);
      }
      .sb-link {
        display: flex; align-items: center; gap: 0.45rem;
        padding: 0.52rem 1.2rem;
        font-size: 0.86rem; color: var(--txt-2);
        text-decoration: none; border: 0; background: transparent; width: 100%; text-align: left;
        border-left: 2px solid transparent; border-right: 2px solid transparent;
        transition: color 0.15s, background 0.15s, border-color 0.15s;
        font-family: var(--sans);
      }
      .sb-link:hover { color: var(--txt); background: var(--bg-2); text-decoration: none; }
      .sb-link.active {
        color: var(--accent); background: var(--bg-2);
        border-left-color: var(--accent); font-weight: 600;
      }
      .sb-badge {
        margin-left: auto; font-family: var(--mono); font-size: 0.62rem;
        background: var(--bg-3); color: var(--accent);
        border: 1px solid rgba(74,222,128,0.2);
        padding: 0.08rem 0.38rem; font-weight: 600;
      }

      .sb-link-hidden { display: none; }

      .docs-main {
        margin-left: var(--sb-w);
        margin-right: var(--toc-w);
        padding: 3rem 0 5rem;
        min-width: 0;
        flex: 1;
      }

      .docs-toc {
        position: fixed; top: var(--nav-h); right: 0; bottom: 0;
        width: var(--toc-w); padding: 2rem 1.1rem;
        border-left: 1px solid var(--border); overflow-y: auto;
        z-index: 50;
      }
      .docs-toc::-webkit-scrollbar { width: 3px; }
      .docs-toc::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }
      .toc-title {
        font-family: var(--mono); font-size: 0.66rem; font-weight: 700;
        letter-spacing: 0.13em; text-transform: uppercase;
        color: var(--txt-3); margin-bottom: 0.65rem;
      }
      .toc-list { list-style: none; display: flex; flex-direction: column; gap: 0.05rem; }
      .toc-item a {
        display: block; font-size: 0.81rem; color: var(--txt-3);
        padding: 0.22rem 0.55rem;
        border-left: 2px solid transparent; border-radius: 0 3px 3px 0;
        text-decoration: none; transition: color 0.15s, background 0.15s;
      }
      .toc-item a:hover { color: var(--txt-2); background: rgba(255,255,255,0.03); text-decoration: none; }
      .toc-item.toc-active a { color: var(--accent); border-left-color: var(--accent); background: var(--accent-dim); }
      .toc-item.toc-sub a { padding-left: 1.1rem; font-size: 0.78rem; }

      .breadcrumb {
        display: flex; align-items: center; gap: 0.45rem;
        margin-bottom: 1.75rem;
        font-family: var(--mono); font-size: 0.78rem; color: var(--txt-3);
      }
      .breadcrumb a { color: var(--txt-3); text-decoration: none; }
      .breadcrumb a:hover { color: var(--txt-2); }
      .breadcrumb .sep { opacity: 0.5; }
      .breadcrumb .crumb-current { color: var(--txt-2); }

      .doc-header {
        margin-bottom: 2.75rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--border);
      }
      .doc-eyebrow {
        font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
        letter-spacing: 0.12em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 0.65rem;
        display: flex; align-items: center; gap: 0.45rem;
      }
      .doc-eyebrow::before { content: '//'; opacity: 0.45; }
      .doc-h1 {
        font-size: 2.3rem; font-weight: 800; line-height: 1.15;
        letter-spacing: -0.025em; color: var(--txt); margin-bottom: 0.9rem;
      }
      .doc-lead { font-size: 1.025rem; color: var(--txt-2); max-width: 560px; line-height: 1.75; }

      .doc-section { margin-bottom: 2.5rem; }
      .doc-section h2 {
        font-size: 1.375rem; font-weight: 700;
        color: var(--txt); letter-spacing: -0.015em;
        margin-bottom: 0.9rem; margin-top: 2.5rem;
        display: flex; align-items: center; gap: 0.65rem;
      }
      .doc-section h3 {
        font-size: 1.05rem; font-weight: 650;
        color: var(--txt); margin-top: 1.75rem; margin-bottom: 0.55rem;
      }
      .doc-section p { color: var(--txt-2); margin-bottom: 0.9rem; line-height: 1.8; }
      .doc-section ul, .doc-section ol { color: var(--txt-2); padding-left: 1.4rem; margin-bottom: 0.9rem; }
      .doc-section li { margin-bottom: 0.35rem; line-height: 1.7; }
      .doc-section strong { color: var(--txt); font-weight: 650; }
      .doc-section code {
        font-family: var(--mono); font-size: 0.845em;
        background: var(--bg-2); border: 1px solid var(--border-md);
        border-radius: 4px; padding: 0.1em 0.42em; color: var(--accent);
      }
      .doc-section a { color: var(--accent); }
      .doc-section a:hover { text-decoration: underline; }

      .code-block {
        margin: 1.35rem 0;
        border: 1px solid var(--border-md);
        border-radius: var(--r); overflow: hidden;
        background: var(--bg-1);
        box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      }
      .code-bar {
        display: flex; align-items: center; gap: 0.5rem;
        padding: 0.55rem 1rem;
        background: var(--bg-2); border-bottom: 1px solid var(--border);
      }
      .code-dots { display: flex; gap: 0.38rem; }
      .code-dot { width: 10px; height: 10px; border-radius: 50%; }
      .code-dot.red   { background: #f87171; }
      .code-dot.amber { background: #fbbf24; }
      .code-dot.green { background: #4ade80; }
      .code-bar-title {
        font-family: var(--mono); font-size: 0.71rem;
        color: var(--txt-3); letter-spacing: 0.07em; margin-left: 0.25rem;
      }
      .code-bar-copy {
        margin-left: auto;
        font-family: var(--mono); font-size: 0.7rem;
        color: var(--txt-3); background: transparent;
        border: 1px solid var(--border); border-radius: 4px;
        padding: 0.18rem 0.52rem; transition: all 0.15s;
        cursor: pointer;
      }
      .code-bar-copy:hover { color: var(--txt); border-color: var(--border-hi); background: var(--bg-3); }
      .code-bar-copy.copied { color: var(--accent); border-color: rgba(74,222,128,0.3); }
      .code-block pre {
        padding: 1.2rem 1.5rem; overflow-x: auto;
        font-family: var(--mono); font-size: 0.875rem;
        line-height: 1.7; color: var(--txt-2);
      }
      .code-block pre code { background: transparent; border: 0; padding: 0; color: var(--txt-2); font-size: 0.875rem; }

      .callout {
        display: flex; gap: 0.8rem;
        padding: 0.9rem 1.15rem;
        border-radius: var(--r); margin: 1.35rem 0;
        border: 1px solid;
      }
      .callout-tag {
        font-family: var(--mono); font-size: 0.68rem; font-weight: 700;
        padding: 0.12rem 0.42rem; border-radius: 4px;
        height: fit-content; margin-top: 0.18rem; flex-shrink: 0;
      }
      .callout-text { font-size: 0.89rem; line-height: 1.65; color: var(--txt-2); }
      .callout-info  { background: var(--indigo-dim); border-color: rgba(129,140,248,0.22); }
      .callout-info  .callout-tag { background: rgba(129,140,248,0.18); color: var(--indigo); }
      .callout-info  .callout-text { color: #c7d2fe; }
      .callout-tip   { background: var(--accent-dim); border-color: rgba(74,222,128,0.22); }
      .callout-tip   .callout-tag { background: rgba(74,222,128,0.18); color: var(--accent); }
      .callout-tip   .callout-text { color: #bbf7d0; }
      .callout-warn  { background: var(--amber-dim); border-color: rgba(251,191,36,0.22); }
      .callout-warn  .callout-tag { background: rgba(251,191,36,0.18); color: var(--amber); }
      .callout-warn  .callout-text { color: #fde68a; }
      .callout-important { background: rgba(139,92,246,0.10); border-color: rgba(139,92,246,0.22); }
      .callout-important .callout-tag { background: rgba(139,92,246,0.18); color: #a78bfa; }
      .callout-important .callout-text { color: #ddd6fe; }

      .docs-table-wrap { overflow-x: auto; margin: 1.35rem 0; }
      .docs-table {
        width: 100%; border-collapse: collapse;
        border: 1px solid var(--border); border-radius: var(--r);
        overflow: hidden; font-size: 0.875rem;
      }
      .docs-table th {
        text-align: left; padding: 0.6rem 1rem;
        background: var(--bg-2); border-bottom: 1px solid var(--border-md);
        font-family: var(--mono); font-size: 0.7rem; font-weight: 700;
        letter-spacing: 0.1em; text-transform: uppercase; color: var(--txt-3);
      }
      .docs-table td { padding: 0.72rem 1rem; border-bottom: 1px solid var(--border); color: var(--txt-2); }
      .docs-table tr:last-child td { border-bottom: none; }

      .doc-divider { border: none; border-top: 1px solid var(--border); margin: 2.75rem 0; }

      .footer {
        border-top: 1px solid var(--border);
        padding: 1.75rem 2rem;
        display: flex; align-items: center; justify-content: space-between;
        margin-left: var(--sb-w); margin-right: var(--toc-w);
        font-size: 0.82rem; color: var(--txt-3);
      }
      .footer-links { display: flex; gap: 1.5rem; }
      .footer-links a { color: var(--txt-3); text-decoration: none; transition: color 0.15s; }
      .footer-links a:hover { color: var(--txt-2); }

      @media (max-width: 1080px) {
        .docs-sidebar { display: none; }
        .docs-toc { display: none; }
        .docs-main { margin-left: 0; margin-right: 0; padding: 2rem 1.5rem 4rem; }
        .footer { margin-left: 0; margin-right: 0; }
      }
    </style>
  </head>
  <body>
    <div class="noise-layer" aria-hidden="true"></div>
    <div class="scroll-progress" id="js-progress" aria-hidden="true"></div>

    <nav class="navbar" aria-label="Primary navigation">
      <a class="nav-logo" href="index.html" aria-label="AEGIS home">
        <span class="nav-logo-icon" aria-hidden="true"></span>
        AEGIS
      </a>
      <div class="nav-links">
        <a href="docs.html" class="active">Docs</a>
        <a href="contact.html">Contact us</a>
        <a href="features.html">Features</a>
      </div>
    </nav>

    <div class="docs-shell">
      <aside class="docs-sidebar" aria-label="Documentation navigation">
        <div class="sb-search">
          <div class="sb-search-wrap">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="js-sb-search" type="search" placeholder="Search docs…" aria-label="Search documentation" />
          </div>
        </div>

        <div class="sb-version">
          <span>AEGIS</span>
          <span class="sb-version-pill">v0.1-alpha</span>
        </div>

        <nav class="sb-nav" aria-label="Docs sections" id="docsNav"></nav>
      </aside>

      <main class="docs-main" id="js-main">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">AEGIS</a>
          <span class="sep" aria-hidden="true">›</span>
          <a href="docs.html">Docs</a>
          <span class="sep" aria-hidden="true">›</span>
          <span class="crumb-current" id="docsBreadcrumb">Getting Started</span>
        </nav>

        <article class="doc-section" id="docsContent">
          <div class="doc-header" id="docsHeader">
            <p class="doc-eyebrow" id="docsEyebrow">Getting Started</p>
            <h1 class="doc-h1" id="docsTitle">Setup &amp; Installation</h1>
          </div>
          <div class="docs-loading">
            <p style="color: var(--txt-3)">Loading documentation…</p>
          </div>
        </article>
      </main>

      <aside class="docs-toc" aria-label="On this page">
        <div class="toc-title">On this page</div>
        <ul class="toc-list" id="tocList"></ul>
      </aside>
    </div>

    <footer class="footer">
      <span>AEGIS</span>
      <div class="footer-links">
        <a href="docs.html">Docs</a>
        <a href="contact.html">Contact us</a>
        <a href="features.html">Features</a>
      </div>
      <span>No telemetry-first assumptions. No cloud-first posture.</span>
    </footer>

    <script>
      const docsContent = document.getElementById('docsContent');
      const docsHeader = document.getElementById('docsHeader');
      const docsTitle = document.getElementById('docsTitle');
      const docsEyebrow = document.getElementById('docsEyebrow');
      const docsBreadcrumb = document.getElementById('docsBreadcrumb');
      const tocList = document.getElementById('tocList');
      const progress = document.getElementById('js-progress');

      const DOCS = [
        { key: 'setup',  title: 'Setup & Installation', path: '../docs/Getting Started/setup.md',               folder: 'Getting Started' },
        { key: 'cli',    title: 'Commands & Workflows',  path: '../docs/Command Line Interface/cli.md',           folder: 'Command Line Interface' },
        { key: 'engine', title: 'Engine Flow',           path: '../docs/Architecture/engine.md',                    folder: 'Architecture' },
        { key: 'project',title: 'Project Layout',        path: '../docs/Architecture/project.md',                   folder: 'Architecture' },
      ];

      function buildSidebar() {
        const nav = document.getElementById('docsNav');
        const folders = {};
        DOCS.forEach(doc => {
          if (!folders[doc.folder]) folders[doc.folder] = [];
          folders[doc.folder].push(doc);
        });
        let html = '';
        for (const [folder, docs] of Object.entries(folders)) {
          html += '<div class="sb-group"><div class="sb-group-label">' + escapeHtml(folder) + '</div>';
          docs.forEach(doc => {
            html += '<button class="sb-link" type="button" data-doc="' + doc.key + '">' + escapeHtml(doc.title) + '</button>';
          });
          html += '</div>';
        }
        nav.innerHTML = html;
      }

      function getDocMeta(docKey) {
        return DOCS.find(d => d.key === docKey) || DOCS[0];
      }

      function escapeHtml(v) {
        return v.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function copyBlock(btn) {
        const pre = btn.closest('.code-block').querySelector('pre');
        navigator.clipboard.writeText(pre.textContent).then(() => {
          btn.textContent = 'copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1600);
        });
      }

      function renderInline(text) {
        return escapeHtml(text)
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
      }

      function renderTable(lines, idx) {
        const rows = [];
        let i = idx;
        while (i < lines.length && /^\|.+\|$/.test(lines[i].trim())) {
          rows.push(lines[i].trim()); i++;
        }
        if (rows.length < 2) return null;
        const cells = rows.map(r => r.slice(1, -1).split('|').map(c => c.trim()));
        if (!cells[1]?.every(c => /^:?-{3,}:?$/.test(c))) return null;
        const headHtml = cells[0].map(c => '<th>' + renderInline(c) + '</th>').join('');
        const bodyHtml = cells.slice(2).map(r => '<tr>' + r.map(c => '<td>' + renderInline(c) + '</td>').join('') + '</tr>').join('');
        return {
          html: '<table class="docs-table"><thead><tr>' + headHtml + '</tr></thead><tbody>' + bodyHtml + '</tbody></table>',
          nextIndex: i
        };
      }

      function markdownToHtml(md) {
        const lines = md.replace(/\r\n/g, '\n').split('\n');
        const html = [];
        let i = 0;

        while (i < lines.length) {
          const line = lines[i], trimmed = line.trim();

          if (!trimmed) { i++; continue; }

          const fence = trimmed.match(/^```([A-Za-z0-9_+#.-]*)/);
          if (fence) {
            const lang = fence[1] || 'text';
            const codeLines = [];
            i++;
            while (i < lines.length && !lines[i].trim().startsWith('```')) { codeLines.push(lines[i]); i++; }
            html.push(
              '<div class="code-block"><div class="code-bar"><div class="code-dots"><span class="code-dot red"></span><span class="code-dot amber"></span><span class="code-dot green"></span></div><span class="code-bar-title">' + escapeHtml(lang) + '</span><button class="code-bar-copy" onclick="copyBlock(this)">copy</button></div><pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre></div>'
            );
            i++; continue;
          }

          const table = renderTable(lines, i);
          if (table) { html.push('<div class="docs-table-wrap">' + table.html + '</div>'); i = table.nextIndex; continue; }

          const heading = trimmed.match(/^(#{1,4})\s+(.+)$/);
          if (heading) {
            const level = Math.min(Number(heading[1].length) + 1, 5);
            const text = heading[2];
            const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            html.push('<h' + level + ' id="' + id + '">' + renderInline(text) + '</h' + level + '>');
            i++; continue;
          }

          if (/^---+$/.test(trimmed)) { html.push('<hr class="doc-divider" />'); i++; continue; }

          if (trimmed.startsWith('>')) {
            const quoteLines = []; let alertType = null;
            while (i < lines.length && lines[i].trim().startsWith('>')) {
              const c = lines[i].trim().replace(/^>\s?/, '');
              const am = c.match(/^\[!(\w+)\]/);
              if (am) { alertType = am[1]; quoteLines.push(c.replace(/^\[\!\w+\]\s*/, '')); }
              else { quoteLines.push(c); }
              i++;
            }
            if (alertType) {
              const tag = alertType.toUpperCase();
              const cls = 'callout-' + alertType.toLowerCase();
              html.push('<div class="callout ' + cls + '"><span class="callout-tag">' + tag + '</span><div class="callout-text">' + quoteLines.map(renderInline).join('<br>') + '</div></div>');
            } else {
              html.push('<blockquote style="border-left: 3px solid var(--border); padding-left: 1rem; color: var(--txt-2); margin: 1rem 0;">' + quoteLines.map(renderInline).join('<br>') + '</blockquote>');
            }
            continue;
          }

          const ordered = trimmed.match(/^\d+\.\s+(.+)$/);
          if (ordered) {
            const items = [];
            while (i < lines.length) {
              const m = lines[i].trim().match(/^\d+\.\s+(.+)$/);
              if (!m) break;
              items.push('<li>' + renderInline(m[1]) + '</li>'); i++;
            }
            html.push('<ol>' + items.join('') + '</ol>'); continue;
          }

          const unordered = trimmed.match(/^[-*]\s+(.+)$/);
          if (unordered) {
            const items = [];
            while (i < lines.length) {
              const m = lines[i].trim().match(/^[-*]\s+(.+)$/);
              if (!m) break;
              items.push('<li>' + renderInline(m[1]) + '</li>'); i++;
            }
            html.push('<ul>' + items.join('') + '</ul>'); continue;
          }

          const para = [];
          while (i < lines.length) {
            const c = lines[i].trim();
            if (!c || /^#{1,4}\s+/.test(c) || /^[-*]\s+/.test(c) || /^\d+\.\s+/.test(c) || /^```/.test(c) || /^\|.+\|$/.test(c) || c.startsWith('>')) break;
            para.push(c); i++;
          }
          html.push('<p>' + renderInline(para.join(' ')) + '</p>');
        }
        return html.join('');
      }

      function buildTOC(container) {
        const headings = container.querySelectorAll('h2, h3');
        tocList.innerHTML = '';
        headings.forEach(h => {
          const li = document.createElement('li');
          li.className = 'toc-item' + (h.tagName === 'H3' ? ' toc-sub' : '');
          const a = document.createElement('a');
          a.href = '#' + h.id;
          a.textContent = h.textContent;
          li.appendChild(a);
          tocList.appendChild(li);
        });
      }

      async function loadDocumentation(docKey) {
        const doc = getDocMeta(docKey);

        docsTitle.innerHTML = doc.title;
        docsEyebrow.textContent = doc.folder;
        docsBreadcrumb.textContent = doc.folder;

        document.querySelectorAll('.sb-link').forEach(l => {
          l.classList.toggle('active', l.dataset.doc === docKey);
        });

        try {
          const resp = await fetch(doc.path);
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const md = await resp.text();
          const html = markdownToHtml(md);

          docsHeader.style.display = 'block';
          docsContent.querySelector('.docs-loading')?.remove();
          docsContent.insertAdjacentHTML('beforeend', html);
          docsContent.querySelector('.docs-loading')?.remove();

          buildTOC(docsContent);
        } catch (err) {
          docsContent.querySelector('.docs-loading')?.remove();
          docsContent.insertAdjacentHTML('beforeend',
            '<div class="callout callout-warn"><span class="callout-tag">ERR</span><div class="callout-text">Could not load ' + escapeHtml(doc.path) + '</div></div>');
        }
      }

      const sidebar = document.getElementById('docsNav');
      sidebar.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-doc]');
        if (!btn) return;
        const docKey = btn.dataset.doc;
        const doc = getDocMeta(docKey);
        docsContent.innerHTML = '<div class="doc-header" id="docsHeader"><p class="doc-eyebrow" id="docsEyebrow">' + escapeHtml(doc.folder) + '</p><h1 class="doc-h1" id="docsTitle">' + escapeHtml(doc.title) + '</h1></div><div class="docs-loading"><p style="color:var(--txt-3)">Loading documentation…</p></div>';
        loadDocumentation(docKey);
      });

      window.addEventListener('scroll', () => {
        const d = document.documentElement;
        const pct = d.scrollHeight - d.clientHeight;
        progress.style.width = pct > 0 ? ((d.scrollTop / pct) * 100) + '%' : '0%';
      }, { passive: true });

      document.getElementById('js-sb-search').addEventListener('input', function () {
        const q = this.value.toLowerCase().trim();
        document.querySelectorAll('.sb-link').forEach(a => {
          a.classList.toggle('sb-link-hidden', q.length > 0 && !a.textContent.toLowerCase().includes(q));
        });
      });

      buildSidebar();
      loadDocumentation('setup');
    </script>
  </body>
</html>
